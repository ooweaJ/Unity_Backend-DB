services:
  backend:
    image: node:18
    container_name: backend
    working_dir: /app
    volumes:
      - ./app:/app
    command: ["./wait-for-it.sh", "mysql:3306", "--", "node", "server.js"]
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: game_db
      MYSQL_USER: gameuser
      MYSQL_PASSWORD: gamepass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

    restart: unless-stopped

volumes:
  db_data:

