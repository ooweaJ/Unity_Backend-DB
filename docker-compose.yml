services:
  backend:
    image: node:18
    container_name: backend
    working_dir: /app
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && ./wait-for-it.sh mysql:3306 -- node server.js"
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: game_db
      MYSQL_USER: gameuser
      MYSQL_PASSWORD: gamepass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

    restart: unless-stopped

  redis:  # 추가
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped


volumes:
  db_data:
  node_modules:
